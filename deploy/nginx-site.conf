# Reference nginx server block for proxywatch.
# Replace <YOUR_DOMAIN> with your actual domain (e.g. proxywatch.example.com).
# Then run certbot --nginx -d <YOUR_DOMAIN> to add TLS termination.
server {
    listen 80;
    listen [::]:80;
    server_name <YOUR_DOMAIN>;

    client_max_body_size 4m;

    location / {
        proxy_pass http://127.0.0.1:18318;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 60s;
    }
}
